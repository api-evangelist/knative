        metadata:
          type: object
          properties:
            resourceVersion:
              type: string
              description: Resource version of the list.
            continue:
              type: string
              description: Pagination continuation token.
        items:
          type: array
          description: List of Trigger resources.
          items:
            $ref: '#/components/schemas/Trigger'
    Channel:
      type: object
      description: >-
        A Knative Channel that provides a pub/sub interface. Events sent to
        the Channel are delivered to all Subscriptions independently. The
        backing implementation is specified via channelTemplate.
      required:
        - apiVersion
        - kind
        - metadata
      properties:
        apiVersion:
          type: string
          const: messaging.knative.dev/v1
          description: API version for the Channel.
        kind:
          type: string
          const: Channel
          description: Resource kind identifier.
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          description: Specification for the Channel.
          properties:
            channelTemplate:
              type: object
              description: Template specifying the Channel implementation to use.
              properties:
                apiVersion:
                  type: string
                  description: API version of the channel implementation resource.
                kind:
                  type: string
                  description: Kind of the channel implementation, such as InMemoryChannel or KafkaChannel.
            delivery:
              $ref: '#/components/schemas/DeliverySpec'
        status:
          type: object
          description: Status of the Channel.
          properties:
            address:
              type: object
              description: URL to which events should be sent for this Channel.
              properties:
                url:
                  type: string
                  format: uri
                  description: Addressable URL for the Channel ingress.
            conditions:
              type: array
              description: Status conditions for the Channel.
              items:
                $ref: '#/components/schemas/Condition'
    ChannelList:
      type: object
      description: A list of Channel resources.
      required:
        - apiVersion
        - kind
        - items
      properties:
        apiVersion:
          type: string
          description: API version for the list.
        kind:
          type: string
          const: ChannelList
          description: List kind identifier.
        metadata:
          type: object
          properties:
            resourceVersion:
              type: string
              description: Resource version of the list.
            continue:
              type: string
              description: Pagination continuation token.
        items:
          type: array
          description: List of Channel resources.
          items:
            $ref: '#/components/schemas/Channel'
    Subscription:
      type: object
      description: >-
        A Knative Subscription that routes events from a Channel to a subscriber
        destination. Each Subscription maintains its own delivery state
        independently of other Subscriptions on the same Channel.
      required:
        - apiVersion
        - kind
        - metadata
        - spec
      properties:
        apiVersion:
          type: string
          const: messaging.knative.dev/v1
          description: API version for the Subscription.
        kind:
          type: string
          const: Subscription
          description: Resource kind identifier.
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          description: Specification for the Subscription.
          required:
            - channel
          properties:
            channel:
              type: object
              description: Reference to the Channel to subscribe to.
              required:
                - name
              properties:
                apiVersion:
                  type: string
                  description: API version of the Channel.
                kind:
                  type: string
                  description: Kind of the Channel resource.
                name:
                  type: string
                  description: Name of the Channel.
            subscriber:
              $ref: '#/components/schemas/Destination'
            reply:
              $ref: '#/components/schemas/Destination'
            delivery:
              $ref: '#/components/schemas/DeliverySpec'
        status:
          type: object
          description: Status of the Subscription.
          properties:
            physicalSubscription:
              type: object
              description: Resolved physical subscription details set by the controller.
              properties:
                subscriberUri:
                  type: string
                  format: uri
                  description: Resolved subscriber URI.
                replyUri:
                  type: string
                  format: uri
                  description: Resolved reply URI.
                deadLetterSinkUri:
                  type: string
                  format: uri
                  description: Resolved dead-letter sink URI.
            conditions:
              type: array
              description: Status conditions for the Subscription.
              items:
                $ref: '#/components/schemas/Condition'
    SubscriptionList:
      type: object
      description: A list of Subscription resources.
      required:
        - apiVersion
        - kind
        - items
      properties:
        apiVersion:
          type: string
          description: API version for the list.
        kind:
          type: string
          const: SubscriptionList
          description: List kind identifier.
        metadata:
          type: object
          properties:
            resourceVersion:
              type: string
              description: Resource version of the list.
            continue:
              type: string
              description: Pagination continuation token.
        items:
          type: array
          description: List of Subscription resources.
          items:
            $ref: '#/components/schemas/Subscription'
    ApiServerSource:
      type: object
      description: >-
        A Knative ApiServerSource that watches Kubernetes API server events
        for specified resource types and forwards them as CloudEvents to a
        sink. Requires a service account with RBAC permissions to watch
        the specified resources.
      required:
        - apiVersion
        - kind
        - metadata
        - spec
      properties:
        apiVersion:
          type: string
          const: sources.knative.dev/v1
          description: API version for the ApiServerSource.
        kind:
          type: string
          const: ApiServerSource
          description: Resource kind identifier.
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          description: Specification for the ApiServerSource.
          required:
            - resources
            - sink
          properties:
            resources:
              type: array
              description: List of API server resource types to watch.
              items:
                type: object
                required:
                  - apiVersion
                  - kind
                properties:
                  apiVersion:
                    type: string
                    description: API version of the resource to watch.
                  kind:
                    type: string
                    description: Kind of the resource to watch.
                  selector:
                    type: object
                    description: Optional label selector to filter watched resources.
            sink:
              $ref: '#/components/schemas/Destination'
            serviceAccountName:
              type: string
              description: Service account with RBAC permissions to watch the listed resources.
            mode:
              type: string
              enum:
                - Reference
                - Resource
              description: >-
                Event mode. Reference sends a reference to the resource;
                Resource sends the full resource body.
            namespaceSelector:
              type: object
              description: Selector for namespaces to watch. If empty, watches the source's namespace.
        status:
          type: object
          description: Status of the ApiServerSource.
          properties:
            sinkUri:
              type: string
              format: uri
              description: Resolved URI of the sink destination.
            conditions:
              type: array
              description: Status conditions for the ApiServerSource.
              items:
                $ref: '#/components/schemas/Condition'
    ApiServerSourceList:
      type: object
      description: A list of ApiServerSource resources.
      required:
        - apiVersion
        - kind
        - items
      properties:
        apiVersion:
          type: string
          description: API version for the list.
        kind:
          type: string
          const: ApiServerSourceList
          description: List kind identifier.
        metadata:
          type: object
          properties:
            resourceVersion:
              type: string
              description: Resource version of the list.
            continue:
              type: string
              description: Pagination continuation token.
        items:
          type: array
          description: List of ApiServerSource resources.
          items:
            $ref: '#/components/schemas/ApiServerSource'
    PingSource:
      type: object
      description: >-
        A Knative PingSource that fires CloudEvents on a cron-based schedule.
        PingSources are used for periodic triggering of event-driven workflows
        and scheduled tasks.
      required:
        - apiVersion
        - kind
        - metadata
        - spec
      properties:
        apiVersion:
          type: string
          const: sources.knative.dev/v1
          description: API version for the PingSource.
        kind:
          type: string
          const: PingSource
          description: Resource kind identifier.
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          description: Specification for the PingSource.
          required:
            - schedule
            - sink
          properties:
            schedule:
              type: string
              description: >-
                Cron expression specifying when to fire events, for example
                "*/2 * * * *" fires every two minutes.
            data:
              type: string
              description: Event payload body sent with each fired event.
            dataContentType:
              type: string
              description: Content type of the event data, typically application/json.
            sink:
              $ref: '#/components/schemas/Destination'
            timezone:
              type: string
              description: >-
                Timezone for interpreting the cron schedule, for example
                America/New_York. Defaults to UTC.
        status:
          type: object
          description: Status of the PingSource.
          properties:
            sinkUri:
              type: string
              format: uri
              description: Resolved URI of the sink destination.
            conditions:
              type: array
              description: Status conditions for the PingSource.
              items:
                $ref: '#/components/schemas/Condition'
    PingSourceList:
      type: object
      description: A list of PingSource resources.
      required:
        - apiVersion
        - kind
        - items
      properties:
        apiVersion:
          type: string
          description: API version for the list.
        kind:
          type: string
          const: PingSourceList
          description: List kind identifier.
        metadata:
          type: object
          properties:
            resourceVersion:
              type: string
              description: Resource version of the list.
            continue:
              type: string
              description: Pagination continuation token.
        items:
          type: array
          description: List of PingSource resources.
          items:
            $ref: '#/components/schemas/PingSource'
    SinkBinding:
      type: object
      description: >-
        A Knative SinkBinding that augments a PodSpecable workload by injecting
        the sink's URI as the K_SINK environment variable. This enables existing
        workloads to send CloudEvents without being rewritten as Knative-native
        event sources.
      required:
        - apiVersion
        - kind
        - metadata
        - spec
      properties:
        apiVersion:
          type: string
          const: sources.knative.dev/v1
          description: API version for the SinkBinding.
        kind:
          type: string
          const: SinkBinding
          description: Resource kind identifier.
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          description: Specification for the SinkBinding.
          required:
            - subject
            - sink
          properties:
            subject:
              type: object
              description: Reference to the PodSpecable workload to bind to.
              required:
                - apiVersion
                - kind
                - name
              properties:
                apiVersion:
                  type: string
                  description: API version of the subject resource.
                kind:
                  type: string
                  description: Kind of the subject resource, such as Deployment or StatefulSet.
                name:
                  type: string
                  description: Name of the subject resource.
                namespace:
                  type: string
                  description: Namespace of the subject resource.
            sink:
              $ref: '#/components/schemas/Destination'
            ceOverrides:
              type: object
              description: CloudEvent overrides to merge into all events sent by the subject.
              properties:
                extensions:
                  type: object
                  description: CloudEvent extension attributes to set on all events.
                  additionalProperties:
                    type: string
        status:
          type: object
          description: Status of the SinkBinding.
          properties:
            sinkUri:
              type: string
              format: uri
              description: Resolved URI of the sink injected as K_SINK.
            conditions:
              type: array
              description: Status conditions for the SinkBinding.
              items:
                $ref: '#/components/schemas/Condition'
    SinkBindingList:
      type: object
      description: A list of SinkBinding resources.
      required:
        - apiVersion
        - kind
        - items
      properties:
        apiVersion:
          type: string
          description: API version for the list.
        kind:
          type: string
          const: SinkBindingList
          description: List kind identifier.
        metadata:
          type: object
          properties:
            resourceVersion:
              type: string
              description: Resource version of the list.
            continue:
              type: string
              description: Pagination continuation token.
        items:
          type: array
          description: List of SinkBinding resources.
          items:
            $ref: '#/components/schemas/SinkBinding'
    EventType:
      type: object
      description: >-
        A Knative EventType that catalogs an event type available from a Broker.
        EventTypes help consumers discover which events are available without
        having to inspect Broker or Trigger configuration directly.
      required:
        - apiVersion
        - kind
        - metadata
      properties:
        apiVersion:
          type: string
          const: eventing.knative.dev/v1beta2
          description: API version for the EventType.
        kind:
          type: string
          const: EventType
          description: Resource kind identifier.
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          description: Specification for the EventType.
          properties:
            type:
              type: string
              description: CloudEvents type attribute value for this event type.
            source:
              type: string
              description: CloudEvents source attribute value for this event type.
            schema:
              type: string
              format: uri
              description: URI to the event schema, such as a JSON Schema or AsyncAPI definition.
            schemaURL:
              type: string
              format: uri
              description: Deprecated alias for schema.
            description:
              type: string
              description: Human-readable description of what this event type represents.
            broker:
              type: string
              description: Name of the Broker that produces this event type.
    EventTypeList:
