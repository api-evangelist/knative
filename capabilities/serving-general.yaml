naftiko: 1.0.0-alpha2
info:
  label: Knative Serving API
  description: 'Knative Serving API. 5 operations. Lead operation: List Knative Services. Self-contained Naftiko capability
    covering one Knative business surface.'
  tags:
  - Knative
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KNATIVE_API_KEY: KNATIVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: serving-general
    baseUri: https://kubernetes.default.svc
    description: Knative Serving API business capability. Self-contained, no shared references.
    resources:
    - name: apis-serving.knative.dev-v1-namespaces-namespace-services
      path: /apis/serving.knative.dev/v1/namespaces/{namespace}/services
      operations:
      - name: listservices
        method: GET
        description: List Knative Services
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createservice
        method: POST
        description: Create a Knative Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: apis-serving.knative.dev-v1-namespaces-namespace-services-name
      path: /apis/serving.knative.dev/v1/namespaces/{namespace}/services/{name}
      operations:
      - name: getservice
        method: GET
        description: Get a Knative Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: replaceservice
        method: PUT
        description: Replace a Knative Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteservice
        method: DELETE
        description: Delete a Knative Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.KNATIVE_API_KEY}}'
  exposes:
  - type: rest
    namespace: serving-general-rest
    port: 8080
    description: REST adapter for Knative Serving API. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/apis/serving-knative-dev/v1/namespaces/{namespace}/services
      name: apis-serving-knative-dev-v1-namespaces-namespace-services
      description: REST surface for apis-serving.knative.dev-v1-namespaces-namespace-services.
      operations:
      - method: GET
        name: listservices
        description: List Knative Services
        call: serving-general.listservices
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createservice
        description: Create a Knative Service
        call: serving-general.createservice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/apis/serving-knative-dev/v1/namespaces/{namespace}/services/{name}
      name: apis-serving-knative-dev-v1-namespaces-namespace-services-name
      description: REST surface for apis-serving.knative.dev-v1-namespaces-namespace-services-name.
      operations:
      - method: GET
        name: getservice
        description: Get a Knative Service
        call: serving-general.getservice
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: replaceservice
        description: Replace a Knative Service
        call: serving-general.replaceservice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteservice
        description: Delete a Knative Service
        call: serving-general.deleteservice
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: serving-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Knative Serving API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-knative-services
      description: List Knative Services
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: serving-general.listservices
      outputParameters:
      - type: object
        mapping: $.
    - name: create-knative-service
      description: Create a Knative Service
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: serving-general.createservice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-knative-service
      description: Get a Knative Service
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: serving-general.getservice
      outputParameters:
      - type: object
        mapping: $.
    - name: replace-knative-service
      description: Replace a Knative Service
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: serving-general.replaceservice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-knative-service
      description: Delete a Knative Service
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: serving-general.deleteservice
      outputParameters:
      - type: object
        mapping: $.
